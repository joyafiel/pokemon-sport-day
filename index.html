<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokemon 運動會選物</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5EFE6; --bg2: #EDE4D8; --card: #FDFAF6;
    --brown: #4A3728; --brown-light: #7A6255;
    --orange: #D4845A; --orange-light: #E8A882;
    --border: #DDD5C8; --text: #3A2E25; --muted: #9A8878;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--brown); padding: 28px 20px 24px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .header::after { content: ''; position: absolute; bottom: -30px; left: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(212,132,90,0.15); }
  .header-tag { display: inline-block; font-size: 11px; letter-spacing: 0.15em; color: var(--orange-light); background: rgba(212,132,90,0.2); padding: 4px 14px; border-radius: 20px; margin-bottom: 10px; }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 24px; font-weight: 700; color: #FDF8F2; letter-spacing: 0.05em; }
  .header-sub { font-size: 13px; color: rgba(253,248,242,0.6); margin-top: 6px; }
  .filter-bar { padding: 14px 16px 6px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 13px; color: var(--brown-light); cursor: pointer; font-family: 'Noto Sans TC'; transition: all 0.2s; }
  .filter-btn.active { background: var(--brown); color: #FDF8F2; border-color: var(--brown); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 16px 100px; max-width: 480px; margin: 0 auto; }
  .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); }
  .card.sold-out { opacity: 0.65; }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--bg2); display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 48px; }
  .card-body { padding: 12px; }
  .card-tag { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 20px; margin-bottom: 6px; font-weight: 500; }
  .tag-normal { background: #F0E8DF; color: var(--orange); }
  .tag-limited { background: #FFF0EA; color: #C4603A; border: 1px solid #F0C4B0; }
  .tag-soldout { background: #EDEBE8; color: var(--muted); }
  .card-name { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 600; color: var(--brown); line-height: 1.45; margin-bottom: 6px; }
  .card-price { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--orange); }
  .card-soldout-price { font-size: 15px; color: var(--muted); text-decoration: line-through; }
  .stock-info { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .qty-control { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
  .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--brown); font-family: 'Noto Sans TC'; flex-shrink: 0; }
  .qty-num { font-size: 15px; font-weight: 500; color: var(--brown); min-width: 20px; text-align: center; }
  .btn-add-cart { flex: 1; padding: 7px; background: var(--brown); color: #FDF8F2; border: none; border-radius: 10px; font-size: 12px; font-family: 'Noto Sans TC'; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; }
  .btn-add-cart:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .btn-add-cart.in-cart { background: var(--orange); }

  /* 購物車浮動按鈕 */
  .cart-fab { position: fixed; bottom: 24px; right: 20px; background: var(--brown); color: #FDF8F2; border: none; border-radius: 28px; padding: 12px 20px; font-size: 14px; font-family: 'Noto Sans TC'; font-weight: 500; cursor: pointer; display: none; align-items: center; gap: 8px; z-index: 50; box-shadow: 0 4px 16px rgba(74,55,40,0.3); }
  .cart-fab.show { display: flex; }
  .cart-count { background: var(--orange); color: #fff; border-radius: 50%; width: 20px; height: 20px; font-size: 11px; display: flex; align-items: center; justify-content: center; font-weight: 700; }

  /* 購物車 Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(58,46,37,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 18px; }
  .modal h2 { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 16px; }
  .cart-item { display: flex; gap: 10px; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--bg2); }
  .cart-item:last-of-type { border-bottom: none; }
  .cart-item-img { width: 44px; height: 44px; border-radius: 8px; object-fit: cover; background: var(--bg2); flex-shrink: 0; }
  .cart-item-info { flex: 1; min-width: 0; }
  .cart-item-name { font-size: 13px; font-weight: 500; color: var(--brown); }
  .cart-item-price { font-size: 12px; color: var(--orange); margin-top: 2px; }
  .cart-item-remove { font-size: 18px; color: var(--muted); cursor: pointer; padding: 4px; background: none; border: none; }
  .cart-total { background: var(--bg2); border-radius: 12px; padding: 12px 16px; margin: 12px 0; display: flex; justify-content: space-between; align-items: center; }
  .cart-total-label { font-size: 14px; color: var(--brown-light); }
  .cart-total-amount { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--orange); }
  .divider { height: 1px; background: var(--border); margin: 16px 0; }
  .form-title { font-family: 'Noto Serif TC', serif; font-size: 15px; font-weight: 600; color: var(--brown); margin-bottom: 12px; }
  label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 4px; margin-top: 12px; letter-spacing: 0.05em; }
  label:first-of-type { margin-top: 0; }
  input { width: 100%; padding: 10px 13px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC'; }
  input:focus { outline: none; border-color: var(--orange-light); }
  .btn-submit { width: 100%; margin-top: 18px; padding: 13px; background: var(--brown); color: #FDF8F2; border: none; border-radius: 12px; font-size: 14px; font-family: 'Noto Sans TC'; font-weight: 500; cursor: pointer; letter-spacing: 0.08em; }
  .btn-cancel { width: 100%; margin-top: 8px; padding: 10px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 12px; font-size: 13px; font-family: 'Noto Sans TC'; cursor: pointer; }

  /* 聯絡資訊 */
  .footer { padding: 0 16px 40px; max-width: 480px; margin: 0 auto; }
  .footer-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; }
  .footer-title { font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--brown); font-weight: 600; margin-bottom: 10px; }
  .footer-row { font-size: 13px; color: var(--muted); line-height: 1.8; }
  .footer-row a { color: var(--orange); text-decoration: none; }

  .toast { display: none; position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--brown); color: #FDF8F2; padding: 10px 20px; border-radius: 24px; font-size: 13px; z-index: 200; white-space: nowrap; }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">POKEMON × SPORT DAY</div>
  <h1>精選商品目錄</h1>
  <div class="header-sub" id="header-sub">載入中...</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all', this)">全部</button>
  <button class="filter-btn" onclick="filterProducts('available', this)">可購買</button>
  <button class="filter-btn" onclick="filterProducts('limited', this)">限量</button>
  <button class="filter-btn" onclick="filterProducts('soldout', this)">售完</button>
</div>

<div class="grid" id="product-grid"></div>

<div class="footer">
  <div class="footer-card">
    <div class="footer-title">聯絡我們</div>
    <div class="footer-row">
      🔗 <a href="https://bit.ly/4oFXrlg">加入 LINE 社群</a>（密碼：16888）<br>
      💬 LINE 客服：<a href="https://lin.ee/nr5ka4S">@755kygtt</a>
    </div>
  </div>
</div>

<button class="cart-fab" id="cart-fab" onclick="openCart()">
  <span>查看購物車</span>
  <span class="cart-count" id="cart-count">0</span>
</button>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>購物車</h2>
    <div id="cart-items"></div>
    <div class="cart-total">
      <span class="cart-total-label">合計</span>
      <span class="cart-total-amount" id="cart-total">NT$ 0</span>
    </div>
    <div class="divider"></div>
    <div class="form-title">填寫訂購資料</div>
    <label>本名</label>
    <input type="text" id="f-realname" placeholder="例：林小美" />
    <label>LINE 名稱</label>
    <input type="text" id="f-linename" placeholder="例：小美🌸" />
    <label>社群暱稱</label>
    <input type="text" id="f-nickname" placeholder="例：皮卡丘愛好者" />
    <label>手機號碼</label>
    <input type="tel" id="f-phone" placeholder="例：0912345678" />
    <button class="btn-submit" onclick="submitOrder()">確認送出訂單</button>
    <button class="btn-cancel" onclick="closeCart()">繼續選購</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];
let cart = {};

async function loadProducts() {
  try {
    const res = await fetch('/api/products?t=' + Date.now());
    allProducts = await res.json();
  } catch(e) { allProducts = []; }
  const total = allProducts.length;
  const avail = allProducts.filter(p => p.stock > 0).length;
  document.getElementById('header-sub').textContent = '共 ' + total + ' 件商品・' + avail + ' 件可購買';
  renderGrid(allProducts);
}

function filterProducts(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'all') renderGrid(allProducts);
  else if (type === 'available') renderGrid(allProducts.filter(p => p.stock > 0));
  else if (type === 'limited') renderGrid(allProducts.filter(p => p.note && p.note.includes('限量')));
  else if (type === 'soldout') renderGrid(allProducts.filter(p => p.stock <= 0));
}

function renderGrid(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) {
    grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--muted);font-size:14px;">沒有符合的商品</div>';
    return;
  }
  grid.innerHTML = products.map(p => {
    const soldOut = p.stock <= 0;
    const isLimited = p.note && p.note.includes('限量');
    const inCart = cart[p.id] || 0;
    let tagHtml = '';
    if (soldOut) tagHtml = '<span class="card-tag tag-soldout">售完</span>';
    else if (isLimited) tagHtml = '<span class="card-tag tag-limited">限量 ' + p.stock + ' 件</span>';
    else if (p.note) tagHtml = '<span class="card-tag tag-normal">' + p.note + '</span>';
    return `<div class="card ${soldOut ? 'sold-out' : ''}">
      ${p.image ? `<img class="card-img" src="${p.image}" alt="${p.name}" />` : `<div class="card-img-placeholder">🎮</div>`}
      <div class="card-body">
        ${tagHtml}
        <div class="card-name">${p.name}</div>
        ${soldOut
          ? `<div class="card-soldout-price">NT$ ${p.price.toLocaleString()}</div>`
          : `<div class="card-price">NT$ ${p.price.toLocaleString()}</div>
             ${p.stock <= 5 && !isLimited ? `<div class="stock-info">僅剩 ${p.stock} 件</div>` : ''}`}
        ${!soldOut ? `
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty('${p.id}', -1)">−</button>
          <span class="qty-num" id="qty-${p.id}">${inCart}</span>
          <button class="qty-btn" onclick="changeQty('${p.id}', 1)">+</button>
          <button class="btn-add-cart ${inCart > 0 ? 'in-cart' : ''}" id="cart-btn-${p.id}" onclick="addToCart('${p.id}')">
            ${inCart > 0 ? '已加入 ✓' : '加入購物車'}
          </button>
        </div>` : ''}
      </div>
    </div>`;
  }).join('');
}

function changeQty(id, delta) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const current = parseInt(document.getElementById('qty-' + id).textContent) || 0;
  const max = Math.min(2, p.stock);
  const newQty = Math.max(0, Math.min(max, current + delta));
  document.getElementById('qty-' + id).textContent = newQty;
}

function addToCart(id) {
  const p = allProducts.find(x => x.id === id);
  if (!p) return;
  const qty = parseInt(document.getElementById('qty-' + id).textContent) || 0;
  if (qty === 0) { showToast('請先選擇數量'); return; }
  cart[id] = qty;
  updateCartFab();
  const btn = document.getElementById('cart-btn-' + id);
  btn.textContent = '已加入 ✓';
  btn.classList.add('in-cart');
  showToast(p.name + ' 已加入購物車');
}

function updateCartFab() {
  const total = Object.values(cart).reduce((a, b) => a + b, 0);
  const fab = document.getElementById('cart-fab');
  document.getElementById('cart-count').textContent = total;
  if (total > 0) fab.classList.add('show');
  else fab.classList.remove('show');
}

function openCart() {
  const items = Object.entries(cart).filter(([id, qty]) => qty > 0);
  if (!items.length) { showToast('購物車是空的'); return; }
  let html = '';
  let total = 0;
  items.forEach(([id, qty]) => {
    const p = allProducts.find(x => x.id === id);
    if (!p) return;
    const subtotal = p.price * qty;
    total += subtotal;
    html += `<div class="cart-item">
      ${p.image ? `<img class="cart-item-img" src="${p.image}" />` : `<div class="cart-item-img" style="display:flex;align-items:center;justify-content:center;font-size:20px;">🎮</div>`}
      <div class="cart-item-info">
        <div class="cart-item-name">${p.name}</div>
        <div class="cart-item-price">NT$ ${p.price.toLocaleString()} × ${qty} = NT$ ${subtotal.toLocaleString()}</div>
      </div>
      <button class="cart-item-remove" onclick="removeFromCart('${id}')">✕</button>
    </div>`;
  });
  document.getElementById('cart-items').innerHTML = html;
  document.getElementById('cart-total').textContent = 'NT$ ' + total.toLocaleString();
  document.getElementById('modal').classList.add('open');
}

function removeFromCart(id) {
  delete cart[id];
  updateCartFab();
  openCart();
  if (Object.keys(cart).length === 0) closeCart();
  renderGrid(allProducts);
}

function closeCart() {
  document.getElementById('modal').classList.remove('open');
}

async function submitOrder() {
  const realname = document.getElementById('f-realname').value.trim();
  const linename = document.getElementById('f-linename').value.trim();
  const nickname = document.getElementById('f-nickname').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!realname || !phone) { alert('請填寫本名和手機號碼'); return; }

  const items = Object.entries(cart).filter(([id, qty]) => qty > 0).map(([id, qty]) => {
    const p = allProducts.find(x => x.id === id);
    return { productId: id, productName: p.name, price: p.price, qty };
  });

  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.textContent = '送出中...';

  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items, realname, linename, nickname, phone })
    });
    const data = await res.json();
    if (data.success) {
      cart = {};
      updateCartFab();
      closeCart();
      renderGrid(allProducts);
      showToast('訂單送出成功！我們會盡快聯絡你 ✓');
      ['f-realname','f-linename','f-nickname','f-phone'].forEach(i => document.getElementById(i).value = '');
    } else { alert(data.message || '送出失敗，請再試一次'); }
  } catch(e) { alert('網路錯誤，請再試一次'); }
  btn.disabled = false; btn.textContent = '確認送出訂單';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

loadProducts();
</script>
</body>
</html>
