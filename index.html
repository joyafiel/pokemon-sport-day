<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokemon 運動會選物</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F5EFE6;
    --bg2: #EDE4D8;
    --card: #FDFAF6;
    --brown: #4A3728;
    --brown-light: #7A6255;
    --orange: #D4845A;
    --orange-light: #E8A882;
    --border: #DDD5C8;
    --text: #3A2E25;
    --muted: #9A8878;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* Header */
  .header { background: var(--brown); padding: 32px 20px 28px; text-align: center; position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -40px; right: -40px; width: 160px; height: 160px; border-radius: 50%; background: rgba(255,255,255,0.04); }
  .header::after { content: ''; position: absolute; bottom: -30px; left: -20px; width: 120px; height: 120px; border-radius: 50%; background: rgba(212,132,90,0.15); }
  .header-tag { display: inline-block; font-size: 11px; letter-spacing: 0.15em; color: var(--orange-light); background: rgba(212,132,90,0.2); padding: 4px 14px; border-radius: 20px; margin-bottom: 12px; font-family: 'Noto Sans TC'; font-weight: 300; }
  .header h1 { font-family: 'Noto Serif TC', serif; font-size: 26px; font-weight: 700; color: #FDF8F2; letter-spacing: 0.05em; line-height: 1.3; }
  .header-sub { font-size: 13px; color: rgba(253,248,242,0.6); margin-top: 8px; font-weight: 300; letter-spacing: 0.05em; }

  /* Filter */
  .filter-bar { padding: 16px 16px 8px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn { flex-shrink: 0; padding: 7px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); font-size: 13px; color: var(--brown-light); cursor: pointer; font-family: 'Noto Sans TC'; transition: all 0.2s; white-space: nowrap; }
  .filter-btn.active { background: var(--brown); color: #FDF8F2; border-color: var(--brown); }

  /* Grid */
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 16px 32px; max-width: 480px; margin: 0 auto; }

  /* Card */
  .card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid var(--border); transition: transform 0.2s; }
  .card:active { transform: scale(0.98); }
  .card.sold-out { opacity: 0.65; }
  .card-img { width: 100%; aspect-ratio: 1; object-fit: cover; background: var(--bg2); display: block; }
  .card-img-placeholder { width: 100%; aspect-ratio: 1; background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 52px; }
  .card-body { padding: 12px; }
  .card-tag { display: inline-block; font-size: 10px; padding: 2px 9px; border-radius: 20px; margin-bottom: 7px; letter-spacing: 0.05em; font-weight: 500; }
  .tag-normal { background: #F0E8DF; color: var(--orange); }
  .tag-limited { background: #FFF0EA; color: #C4603A; border: 1px solid #F0C4B0; }
  .tag-soldout { background: #EDEBE8; color: var(--muted); }
  .card-name { font-family: 'Noto Serif TC', serif; font-size: 14px; font-weight: 600; color: var(--brown); line-height: 1.45; margin-bottom: 8px; }
  .card-price { font-family: 'Noto Serif TC', serif; font-size: 20px; font-weight: 700; color: var(--orange); }
  .card-soldout-price { font-size: 16px; color: var(--muted); font-weight: 400; text-decoration: line-through; }
  .stock-info { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .btn-order { width: 100%; margin-top: 10px; padding: 9px; background: var(--brown); color: #FDF8F2; border: none; border-radius: 10px; font-size: 13px; font-family: 'Noto Sans TC'; font-weight: 500; cursor: pointer; letter-spacing: 0.05em; transition: background 0.2s; }
  .btn-order:hover { background: var(--brown-light); }
  .btn-order:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

  /* Modal */
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(58,46,37,0.5); z-index: 100; align-items: flex-end; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--card); border-radius: 24px 24px 0 0; padding: 28px 24px 40px; width: 100%; max-width: 480px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 4px; margin: 0 auto 20px; }
  .modal h2 { font-family: 'Noto Serif TC', serif; font-size: 18px; font-weight: 700; color: var(--brown); margin-bottom: 4px; }
  .modal-product { font-size: 13px; color: var(--orange); font-weight: 500; margin-bottom: 20px; }
  .modal label { font-size: 12px; color: var(--muted); display: block; margin-bottom: 5px; margin-top: 14px; letter-spacing: 0.05em; }
  .modal input, .modal select { width: 100%; padding: 11px 14px; border: 1px solid var(--border); border-radius: 10px; font-size: 14px; background: var(--bg); color: var(--text); font-family: 'Noto Sans TC'; }
  .modal input:focus, .modal select:focus { outline: none; border-color: var(--orange-light); }
  .modal-btns { display: flex; gap: 10px; margin-top: 22px; }
  .btn-cancel { flex: 1; padding: 12px; background: var(--bg2); border: none; border-radius: 12px; font-size: 14px; color: var(--brown-light); cursor: pointer; font-family: 'Noto Sans TC'; }
  .btn-submit { flex: 2; padding: 12px; background: var(--brown); color: #FDF8F2; border: none; border-radius: 12px; font-size: 14px; font-weight: 500; cursor: pointer; font-family: 'Noto Sans TC'; letter-spacing: 0.05em; }

  /* Toast */
  .toast { display: none; position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: var(--brown); color: #FDF8F2; padding: 11px 24px; border-radius: 24px; font-size: 13px; z-index: 200; white-space: nowrap; letter-spacing: 0.05em; }
  .toast.show { display: block; }

  /* Footer */
  .footer { text-align: center; padding: 0 16px 40px; }
  .footer-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; }
  .footer-title { font-family: 'Noto Serif TC', serif; font-size: 14px; color: var(--brown); font-weight: 600; margin-bottom: 6px; }
  .footer-sub { font-size: 13px; color: var(--muted); line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="header-tag">POKEMON × SPORT DAY</div>
  <h1>精選商品目錄</h1>
  <div class="header-sub" id="header-sub">載入中...</div>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterProducts('all', this)">全部</button>
  <button class="filter-btn" onclick="filterProducts('available', this)">可購買</button>
  <button class="filter-btn" onclick="filterProducts('limited', this)">限量</button>
  <button class="filter-btn" onclick="filterProducts('soldout', this)">售完</button>
</div>

<div class="grid" id="product-grid"></div>

<div class="footer">
  <div class="footer-card">
    <div class="footer-title">詢問 & 訂購</div>
    <div class="footer-sub" id="footer-contact">有任何問題歡迎 LINE 私訊</div>
  </div>
</div>

<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>填寫訂購資料</h2>
    <div class="modal-product" id="modal-info"></div>
    <label>你的名字</label>
    <input type="text" id="order-name" placeholder="例：小美" />
    <label>LINE ID 或手機號碼</label>
    <input type="text" id="order-contact" placeholder="@yourline" />
    <label>數量</label>
    <select id="order-qty">
      <option value="1">1 件</option>
      <option value="2">2 件</option>
      <option value="3">3 件</option>
    </select>
    <label>備註（選填）</label>
    <input type="text" id="order-note" placeholder="例：要禮盒包裝" />
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" onclick="submitOrder()">確認訂購</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allProducts = [];
let selectedProduct = null;

async function loadProducts() {
  try {
    const res = await fetch('/api/products');
    allProducts = await res.json();
  } catch(e) { allProducts = []; }
  const total = allProducts.length;
  const avail = allProducts.filter(p => p.stock > 0).length;
  document.getElementById('header-sub').textContent = '共 ' + total + ' 件商品・' + avail + ' 件可購買';
  renderGrid(allProducts);
}

function filterProducts(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (type === 'all') renderGrid(allProducts);
  else if (type === 'available') renderGrid(allProducts.filter(p => p.stock > 0));
  else if (type === 'limited') renderGrid(allProducts.filter(p => p.note && p.note.includes('限量')));
  else if (type === 'soldout') renderGrid(allProducts.filter(p => p.stock <= 0));
}

function renderGrid(products) {
  const grid = document.getElementById('product-grid');
  if (!products.length) {
    grid.innerHTML = '<div style="grid-column:span 2;text-align:center;padding:40px;color:var(--muted);font-size:14px;">沒有符合的商品</div>';
    return;
  }
  grid.innerHTML = products.map(p => {
    const soldOut = p.stock <= 0;
    const isLimited = p.note && p.note.includes('限量');
    let tagHtml = '';
    if (soldOut) tagHtml = '<span class="card-tag tag-soldout">售完</span>';
    else if (isLimited) tagHtml = '<span class="card-tag tag-limited">限量 ' + p.stock + ' 件</span>';
    else if (p.note) tagHtml = '<span class="card-tag tag-normal">' + p.note + '</span>';
    return `<div class="card ${soldOut ? 'sold-out' : ''}">
      ${p.image ? `<img class="card-img" src="${p.image}" alt="${p.name}" />` : `<div class="card-img-placeholder">🎮</div>`}
      <div class="card-body">
        ${tagHtml}
        <div class="card-name">${p.name}</div>
        ${soldOut
          ? `<div class="card-soldout-price">NT$ ${p.price.toLocaleString()}</div>`
          : `<div class="card-price">NT$ ${p.price.toLocaleString()}</div>
             ${p.stock <= 5 && !isLimited ? `<div class="stock-info">僅剩 ${p.stock} 件</div>` : ''}`}
        <button class="btn-order" ${soldOut ? 'disabled' : ''} onclick="openModal('${p.id}')">
          ${soldOut ? '已售完' : '我要訂購'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function openModal(id) {
  selectedProduct = allProducts.find(p => p.id === id);
  document.getElementById('modal-info').textContent = selectedProduct.name + '・NT$ ' + selectedProduct.price.toLocaleString();
  ['order-name','order-contact','order-note'].forEach(i => document.getElementById(i).value = '');
  document.getElementById('order-qty').value = '1';
  document.getElementById('modal').classList.add('open');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function submitOrder() {
  const name = document.getElementById('order-name').value.trim();
  const contact = document.getElementById('order-contact').value.trim();
  const qty = parseInt(document.getElementById('order-qty').value);
  const note = document.getElementById('order-note').value.trim();
  if (!name || !contact) { alert('請填寫名字和聯絡方式'); return; }
  const btn = document.querySelector('.btn-submit');
  btn.disabled = true; btn.textContent = '送出中...';
  try {
    const res = await fetch('/api/order', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ productId: selectedProduct.id, productName: selectedProduct.name, price: selectedProduct.price, qty, name, contact, note })
    });
    const data = await res.json();
    if (data.success) {
      closeModal();
      showToast('訂購成功！我們會盡快聯絡你 ✓');
      selectedProduct.stock -= qty;
      renderGrid(allProducts);
    } else { alert(data.message || '送出失敗，請再試一次'); }
  } catch(e) { alert('網路錯誤，請再試一次'); }
  btn.disabled = false; btn.textContent = '確認訂購';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

loadProducts();
</script>
</body>
</html>
